name: release

on:
  push:
    branches:
      - realtimex
    paths:
      - 'package.json'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (optional if tagging)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Get package version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag-exists
        run: |
          if git rev-parse "v${{ steps.package-version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.tag-exists.outputs.exists == 'false' && github.ref == 'refs/heads/realtimex'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag "v${{ steps.package-version.outputs.version }}"
          git push origin "v${{ steps.package-version.outputs.version }}"

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/realtimex' && steps.tag-exists.outputs.exists == 'false')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Publishing version ${{ steps.package-version.outputs.version }}"
          npm publish --provenance --access public

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/realtimex' && steps.tag-exists.outputs.exists == 'false')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package-version.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MCP Publisher
        if: startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/realtimex' && steps.tag-exists.outputs.exists == 'false')
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/v1.1.0/mcp-publisher_1.1.0_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login to MCP Registry
        if: startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/realtimex' && steps.tag-exists.outputs.exists == 'false')
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/realtimex' && steps.tag-exists.outputs.exists == 'false')
        run: mcp-publisher publish

