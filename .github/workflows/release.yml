name: release

on:
  push:
    branches:
      - realtimex
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (optional if tagging)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # This condition prevents the workflow from running on commits made by the workflow itself
    if: "contains(github.event.head_commit.message, 'chore(release)') == false"
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We need a token with write access to push the version bump
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Bump version and create tag
        id: bump-version
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # npm version patch will create a new commit and a new tag
          npm version patch -m "chore(release): v%s"
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Push changes and tag
        run: |
          git push
          git push origin ${{ steps.bump-version.outputs.tag }}

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Publishing version ${{ steps.bump-version.outputs.version }}"
          npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump-version.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MCP Publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/v1.1.0/mcp-publisher_1.1.0_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login to MCP Registry
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish