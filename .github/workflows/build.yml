name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Continuous Integration
        run: |
          npm install
          npm run build
      - name: Verify tools export (area present)
        run: |
          node -e "const charts=require('./build/charts/index.js'); const tools=(Object.values(charts)||[]).map(m=>m&&m.tool&&m.tool.name).filter(Boolean); console.log('tools:', tools.length); if(!tools.includes('generate_area_chart')){ console.error('ERROR: generate_area_chart missing from build exports'); process.exit(1); }"
